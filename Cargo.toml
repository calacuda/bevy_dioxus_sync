[package]
name = "bevy_dioxus_sync"
version = "0.2.0"
edition = "2024"
description = "Top crate for bevy-dioxus interop through syncronization"
license = "MIT OR Apache-2.0"
repository = "https://github.com/rydb/bevy_dioxus_sync"
keywords = ["dom", "ui", "gui", "bevy", "dioxus"]

[workspace.package]
version = "0.2.0"
edition = "2024"

[workspace]
members = [
    "crates/*",
    "examples/*"
]
resolver = "3"

[patch.crates-io]
# anyrender_vello = { git = "https://github.com/DioxusLabs/anyrender.git", ref="4b5fb87176fe2c0edbfd841d6a30f5b411b585a9", version = "0.7.1" }
# anyrender_vello_2 = { git = "https://github.com/DioxusLabs/anyrender.git", ref="4b5fb87176fe2c0edbfd841d6a30f5b411b585a9", package = "anyrender_vello", version = "0.7.1" }
# anyrender_vello = { git = "https://github.com/DioxusLabs/anyrender.git", rev="4b5fb87176fe2c0edbfd841d6a30f5b411b585a9", package = "anyrender_vello", version = "=0.7.1" }
anyrender_vello = { git = "https://github.com/DioxusLabs/anyrender.git", rev="1288ed6be23c972df01d57d4c701f4c77906d383", package = "anyrender_vello", version = "=0.7.0" }
# anyrender_vello = "=0.7.0"
anyrender = { git = "https://github.com/DioxusLabs/anyrender.git", rev="1288ed6be23c972df01d57d4c701f4c77906d383", package = "anyrender", version = "=0.7.0" }
# vello_2 = { git = "https://github.com/linebender/vello.git", ref="7f45113b44f862bb101b54238a3e7b8ddf882e50", package = "vello", version = "0.7.0" }
# vello = { git = "https://github.com/linebender/vello.git", ref="7f45113b44f862bb101b54238a3e7b8ddf882e50", package = "vello", version = "0.6.1" }
vello = { git = "https://github.com/linebender/vello.git", rev="5779e8111dc1b609c5d0c9f8ec0e8661cc507131", package = "vello", version = "=0.7.0" }
# vello = { git = "https://github.com/linebender/vello.git", rev="00a6e8a3d5c9d1ff68b1129795ae2632cc199e78", package = "vello", version = "=0.6.0" }
# wgpu = { version = "=27.0.1", git = "https://github.com/gfx-rs/wgpu.git", rev = "c76dea031c688ecef0050dbf60506fff128fb23f", package = "wgpu" }
wgpu = { version = "=27.0.3", git = "https://github.com/gfx-rs/wgpu.git", rev = "542d7c98cee1e5ea6a085e032102643f0c54e9aa", package = "wgpu" }
# wgpu_types = { version = "=27.0.1", git = "https://github.com/gfx-rs/wgpu.git", rev = "c76dea031c688ecef0050dbf60506fff128fb23f", package = "wgpu-types" }
wgpu_types = { version = "=27.0.3", git = "https://github.com/gfx-rs/wgpu.git", rev = "542d7c98cee1e5ea6a085e032102643f0c54e9aa", package = "wgpu-types" }
naga = { version = "27.0.1", git = "https://github.com/gfx-rs/wgpu.git", rev = "542d7c98cee1e5ea6a085e032102643f0c54e9aa", package = "naga", features = ["stderr", "termcolor"] }
blitz_paint = { version = "=0.2.1", git = "https://github.com/DioxusLabs/blitz.git", rev = "05c9892932a3d03858f634d416606a376052e544", package = "blitz-paint" }

# [replace]
# # wgpu = "=26"
# # anyrender_vello = { git = "https://github.com/DioxusLabs/anyrender", ref="4b5fb87176fe2c0edbfd841d6a30f5b411b585a9", version = "0.7.1" }
# "anyrender_vello:0.6.2" = { git = "https://github.com/DioxusLabs/anyrender", ref="4b5fb87176fe2c0edbfd841d6a30f5b411b585a9" }
